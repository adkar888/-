<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكار - Adhkar</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: #1a0f0a;
            min-height: 100vh;
            padding: 30px 20px 50px;
            color: #f5e6d3;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* الشعار */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            max-width: 150px;
            height: auto;
            border-radius: 50%; /* إذا أردت شعار دائري، يمكنك إزالة هذه الخاصية */
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 3px solid #c49a6c;
        }
        /* تبديل اللغة */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .lang-btn {
            background: #8b5a2b;
            color: #f5e6d3;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 2px solid #c49a6c;
            transition: 0.2s;
        }
        .lang-btn:hover {
            background: #c49a6c;
            color: #1a0f0a;
        }
        /* قسم المواقيت */
        .prayer-section {
            background: #2c1a12;
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid #c49a6c;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .location-selector {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .city-select {
            flex: 1;
            min-width: 250px;
            position: relative;
        }
        .city-select i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #1a0f0a;
            font-size: 1.2rem;
            pointer-events: none;
            z-index: 2;
        }
        .city-select select {
            width: 100%;
            padding: 18px 50px 18px 25px;
            border-radius: 60px;
            border: 2px solid #c49a6c;
            font-size: 1.3rem;
            background: #f5e6d3;
            font-family: 'Tajawal', sans-serif;
            font-weight: 500;
            color: #1a0f0a;
            cursor: pointer;
            appearance: none;
        }
        .city-select select:focus {
            outline: none;
            border-color: #8b5a2b;
            box-shadow: 0 0 0 3px rgba(139,90,43,0.3);
        }
        .location-btn {
            background: #c49a6c;
            border: 2px solid #8b5a2b;
            border-radius: 60px;
            padding: 16px 30px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a0f0a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.2s;
            white-space: nowrap;
        }
        .location-btn i {
            color: #1a0f0a;
            font-size: 1.5rem;
        }
        .location-btn:hover {
            background: #8b5a2b;
            color: #f5e6d3;
        }
        .prayer-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin: 25px 0 15px;
        }
        .prayer-item {
            background: #f5e6d3;
            border-radius: 30px;
            padding: 15px 10px;
            text-align: center;
            border: 1px solid #c49a6c;
            box-shadow: 0 8px 0 #5a3a1e;
        }
        .prayer-item.highlight {
            background: #c49a6c;
            border: 2px solid #8b5a2b;
        }
        .prayer-item .name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a0f0a;
            margin-bottom: 8px;
        }
        .prayer-item .time {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #5a3a1e;
            line-height: 1.2;
        }
        .countdown {
            text-align: center;
            font-size: 1.5rem;
            background: #2c1a12;
            padding: 15px;
            border-radius: 60px;
            border: 1px solid #c49a6c;
            margin-top: 15px;
            color: #f5e6d3;
        }
        .countdown i {
            color: #c49a6c;
            margin-left: 10px;
        }
        .monthly-btn {
            background: transparent;
            border: 2px dashed #c49a6c;
            color: #c49a6c;
            font-size: 1.3rem;
            padding: 12px 25px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .monthly-btn:hover {
            background: rgba(196,154,108,0.2);
        }
        /* الهيدر مع البحث والمفضلة */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 25px;
            background: #2c1a12;
            border-radius: 80px;
            border: 1px solid #c49a6c;
        }
        .header h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            color: #c49a6c;
            text-shadow: 0 2px 10px #8b5a2b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }
        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #5a3a1e;
            font-size: 1.4rem;
        }
        .search-box input {
            width: 100%;
            padding: 18px 55px 18px 25px;
            border-radius: 60px;
            border: 2px solid transparent;
            font-size: 1.3rem;
            background: #f5e6d3;
            font-family: 'Tajawal', sans-serif;
            color: #1a0f0a;
        }
        .search-box input:focus {
            outline: none;
            border-color: #c49a6c;
            background: #ffffff;
        }
        .favorite-toggle {
            background: #c49a6c;
            border: 2px solid #8b5a2b;
            border-radius: 60px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #1a0f0a;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
        }
        .favorite-toggle i {
            color: #1a0f0a;
        }
        .favorite-toggle.active {
            background: #8b5a2b;
            color: #f5e6d3;
        }
        /* شبكة البطاقات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .card {
            background: #f5e6d3;
            border-radius: 40px;
            padding: 25px 20px 20px;
            box-shadow: 0 20px 30px -8px #00000080, 0 0 0 1px #c49a6c inset;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #8b5a2b;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -5px #000, 0 0 0 2px #8b5a2b inset;
        }
        .favorite-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 10;
            color: #c0c0c0;
            border: 1px solid #8b5a2b;
        }
        .favorite-btn.favorite-active {
            color: #8b5a2b;
            background: #fff0e0;
            border-color: #8b5a2b;
        }
        .card-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #5a3a1e;
            background: #fff1cc;
            display: inline-block;
            padding: 8px 25px 8px 60px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #8b5a2b;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            line-height: 1.7;
            font-weight: 700;
            color: #1a0f0a;
            background: #fff9f0;
            padding: 25px 15px;
            border-radius: 35px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid #8b5a2b;
        }
        .description {
            font-size: 1.3rem;
            color: #1a0f0a;
            background: #deedf2;
            padding: 12px 20px;
            border-radius: 50px;
            margin: 10px 0 20px;
            text-align: center;
            border: 1px solid #8b5a2b;
            background: #e6d5b8;
        }
        .copy-btn {
            background: #8b5a2b;
            border: none;
            color: #f5e6d3;
            font-size: 1.4rem;
            padding: 15px 20px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid #c49a6c;
            margin-top: auto;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            box-shadow: 0 8px 0 #5a3a1e;
            width: 100%;
        }
        .copy-btn:hover {
            background: #c49a6c;
            color: #1a0f0a;
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #5a3a1e;
        }
        .copy-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #5a3a1e;
        }
        /* النوافذ المنبثقة */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #2c1a12;
            color: #f5e6d3;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.6rem;
            box-shadow: 0 10px 30px #000000b3;
            border: 2px solid #c49a6c;
            z-index: 1000;
            display: none;
        }
        .toast.show {
            display: block;
            animation: fadeInOut 2s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }
        .modal.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #2c1a12;
            border-radius: 50px;
            padding: 30px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            border: 3px solid #c49a6c;
        }
        .modal-content h2 {
            color: #c49a6c;
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-align: center;
        }
        .monthly-table {
            width: 100%;
            border-collapse: collapse;
            color: #f5e6d3;
        }
        .monthly-table th {
            background: #c49a6c;
            color: #1a0f0a;
            font-size: 1.2rem;
            padding: 10px;
        }
        .monthly-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #c49a6c55;
        }
        .close-modal {
            background: #8b5a2b;
            color: #f5e6d3;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 1.3rem;
            margin-top: 20px;
            cursor: pointer;
            width: 100%;
        }
        footer {
            margin-top: 70px;
            text-align: center;
            font-size: 1.4rem;
            color: #f5e6d3;
            background: #2c1a12;
            padding: 20px 40px;
            border-radius: 80px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #c49a6c;
        }
        footer i {
            color: #c49a6c;
            margin: 0 10px;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 2.3rem; }
            .prayer-item .time { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- زر تبديل اللغة -->
        <div class="lang-switch">
            <button class="lang-btn" id="langToggle">
                <i class="fas fa-language"></i>
                <span id="langText">English</span>
            </button>
        </div>

        <!-- الشعار -->
        <div class="logo-container">
            <img src="20260311_211121.png" alt="شعار أذكار" class="logo">

        <!-- قسم المواقيت -->
        <div class="prayer-section">

                <div class="city-select">

                    <i class="fas fa-location-dot"></i>
                    <span id="detectLocationText">حدد موقعي</span>
                </button>
            </div>

            <div class="prayer-cards" id="prayerTimes">
                <div class="prayer-item">
                    <div class="name" id="imsakLabel">الإمساك</div>

                <div class="prayer-item">

                <div class="prayer-item">
                    <div class="name" id="dhuhrLabel">الظهر</div>
                    <div class="time" id="dhuhr">--:--</div>

                <div class="prayer-item highlight">

                    <div class="name" id="ishaLabe">العشاء</div>

            </div>

            <div class="countdown" id="countdown">
                <i class="fas fa-hourglass-half"></i>
                <span id="countdownText">اختر مدينة لعرض المواقيت</span>
            </div>

            <button class="monthly-btn" id="showMonthly">
                <i class="fas fa-calendar-alt"></i>
                <span id="monthlyBtnText">عرض إمساكية الشهر كاملة</span>
            </button>
        </div>

        <!-- الهيدر مع البحث والمفضلة -->
        <div class="header">
            <h1>
                <i class="fas fa-moon"></i>
                <span id="siteTitle">أذكار</span>
                <i class="fas fa-star"></i>
            </h1>
            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="ابحث عن ذكر...">
                </div>
                <button class="favorite-toggle" id="favoriteToggle">
                    <i class="fas fa-heart"></i>
                    <span id="favToggleText">المفضلة</span>
                </button>
            </div>
        </div>

        <!-- شبكة الأذكار -->
        <div class="grid" id="adhkarGrid"></div>
        <div id="noResults" class="no-results" style="display: none; text-align: center; font-size: 2rem; color: #c49a6c; background: rgba(0,0,0,0.2); padding: 40px; border-radius: 60px;">لا توجد نتائج مطابقة</div>

        <!-- نافذة الإمساكية الشهرية -->
        <div class="modal" id="monthlyModal">
            <div class="modal-content">
                <h2 id="modalCity">إمساكية رمضان 1447 هـ</h2>
                <table class="monthly-table" id="monthlyTable">
                    <thead>
                        <tr>
                            <th id="thDay">اليوم</th>
                            <th id="thDate">التاريخ</th>
                            <th id="thImsak">الإمساك</th>

                            <th id="thMaghrib">المغرب</th>
                        </tr>
                    </thead>
                    <tbody id="monthlyBody"></tbody>
                </table>
                <button class="close-modal" onclick="document.getElementById('monthlyModal').classList.remove('show')" id="closeModalBtn">إغلاق</button>
            </div>
        </div>

        <footer>
            <i class="fas fa-heart"></i> 
            <span id="footerText">تقبل الله منا ومنكم</span>
            <i class="fas fa-heart"></i>
        </footer>
    </div>

    <div class="toast" id="toast">✅ تم النسخ</div>

    <script>
        // ==================== قائمة الأذكار ====================
        const adhkar = [
            { id: 1, title: "🌟 دعاء رؤية الهلال", arabic: "اللَّهُمَّ أَهْلِلْهُ عَلَيْنَا بِالأَمْنِ وَالإِيمَانِ، وَالسَّلاَمَةِ وَالإِسْلاَمِ، رَبِّي وَرَبُّكَ اللَّهُ", desc: "يُقال عند رؤية هلال رمضان" },
            { id: 2, title: "🌙 نية الصوم", arabic: "نَوَيْتُ صَوْمَ غَدٍ مِنْ شَهْرِ رَمَضَانَ", desc: "تُقال في القلب عند السحور" },
            { id: 3, title: "🍽️ دعاء قبل الإفطار", arabic: "اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ", desc: "يُقال قبل تناول الإفطار" },
            { id: 4, title: "💧 دعاء بعد الإفطار", arabic: "ذَهَبَ الظَّمَأُ وَابْتَلَّتِ الْعُرُوقُ، وَثَبَتَ الأَجْرُ إِنْ شَاءَ اللَّهُ", desc: "يُقال بعد الإفطار" },
            { id: 5, title: "🌃 دعاء ليلة القدر", arabic: "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي", desc: "أفضل دعاء في العشر الأواخر" },
            { id: 6, title: "🕯️ دعاء العشر الأواخر", arabic: "اللَّهُمَّ أَجِرْنِي مِنَ النَّارِ", desc: "يُردد بكثرة في العشر الأواخر" },
            { id: 7, title: "👨‍👩‍👧 دعاء الإفطار عند الآخرين", arabic: "أَفْطَرَ عِنْدَكُمُ الصَّائِمُونَ، وَأَكَلَ طَعَامَكُمُ الأَبْرَارُ، وَتَنَزَّلَتْ عَلَيْكُمُ الْمَلاَئِكَةُ", desc: "يُقال لمن أفطرت عندهم" },
            { id: 8, title: "🥗 دعاء السحور", arabic: "اللَّهُمَّ بَارِكْ لَنَا فِي سُحُورِنَا وَاغْفِرْ لَنَا ذُنُوبَنَا", desc: "طلب البركة والمغفرة في السحور" },
            { id: 9, title: "🤲 دعاء الصائم إذا حضر الطعام", arabic: "إِذَا دُعِيَ أَحَدُكُمْ إِلَى طَعَامٍ فَلْيُجِبْ، فَإِنْ كَانَ صَائِمًا فَلْيُصَلِّ", desc: "الدعاء عند دعوة الصائم" },
            { id: 10, title: "📿 دعاء يوم الجمعة في رمضان", arabic: "اللَّهُمَّ اغْفِرْ لِلْمُسْلِمِينَ وَالْمُسْلِمَاتِ، وَالْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ، الأَحْيَاءِ مِنْهُمْ وَالأَمْوَاتِ", desc: "يُستحب الإكثار منه يوم الجمعة" }
        ];

        // ==================== الترجمة ====================
        const translations = {
            ar: {
                siteTitle: "أذكار",
                selectCity: "-- اختر مدينتك --",
                detectLocation: "حدد موقعي",
                imsak: "الإمساك",
                fajr: "الفجر",
                sunrise: "الشروق",
                dhuhr: "الظهر",
                asr: "العصر",
                maghrib: "المغرب (الإفطار)",
                isha: "العشاء",
                countdownDefault: "اختر مدينة لعرض المواقيت",
                monthlyBtn: "عرض إمساكية الشهر كاملة",
                searchPlaceholder: "ابحث عن ذكر...",
                favToggle: "المفضلة",
                noResults: "لا توجد نتائج مطابقة",
                footer: "تقبل الله منا ومنكم",
                copyToast: "✅ تم النسخ",
                locationToast: "جاري تحديد موقعك...",
                locationError: "فشل تحديد الموقع، حاول مرة أخرى",
                locationDenied: "يرجى السماح بالوصول إلى الموقع",
                locationUnsupported: "المتصفح لا يدعم تحديد الموقع",
                loadingTimes: "جاري تحميل المواقيت...",
                timesUpdated: "تم تحديث المواقيت",
                timesFailed: "فشل تحميل المواقيت",
                modalTitle: "إمساكية رمضان 1447 هـ - ",
                thDay: "اليوم",
                thDate: "التاريخ",
                thImsak: "الإمساك",
                thFajr: "الفجر",
                thMaghrib: "المغرب",
                closeModal: "إغلاق",
                langToggle: "English"
            },
            en: {
                siteTitle: "Adhkar",
                selectCity: "-- Select your city --",
                detectLocation: "Detect my location",
                imsak: "Imsak",
                fajr: "Fajr",
                sunrise: "Sunrise",
                dhuhr: "Dhuhr",
                asr: "Asr",
                maghrib: "Maghrib (Iftar)",
                isha: "Isha",
                countdownDefault: "Select a city to view times",
                monthlyBtn: "View full month timetable",
                searchPlaceholder: "Search for dhikr...",
                favToggle: "Favorites",
                noResults: "No matching results",
                footer: "May Allah accept from us and you",
                copyToast: "✅ Copied",
                locationToast: "Detecting your location...",
                locationError: "Location detection failed, try again",
                locationDenied: "Please allow location access",
                locationUnsupported: "Browser does not support location",
                loadingTimes: "Loading prayer times...",
                timesUpdated: "Times updated",
                timesFailed: "Failed to load times",
                modalTitle: "Ramadan 1447 AH Timetable - ",
                thDay: "Day",
                thDate: "Date",
                thImsak: "Imsak",
                thFajr: "Fajr",
                thMaghrib: "Maghrib",
                closeModal: "Close",
                langToggle: "العربية"
            }
        };

        let currentLang = 'ar';

        const langElements = {
            siteTitle: document.getElementById('siteTitle'),
            selectCityOption: document.getElementById('selectCityOption'),
            detectLocationText: document.getElementById('detectLocationText'),
            imsakLabel: document.getElementById('imsakLabel'),
            fajrLabel: document.getElementById('fajrLabel'),
            sunriseLabel: document.getElementById('sunriseLabel'),
            dhuhrLabel: document.getElementById('dhuhrLabel'),
            asrLabel: document.getElementById('asrLabel'),
            maghribLabel: document.getElementById('maghribLabel'),
            ishaLabe: document.getElementById('ishaLabe'),
            countdownText: document.getElementById('countdownText'),
            monthlyBtnText: document.getElementById('monthlyBtnText'),
            searchInput: document.getElementById('searchInput'),
            favToggleText: document.getElementById('favToggleText'),
            noResults: document.getElementById('noResults'),
            footerText: document.getElementById('footerText'),
            langText: document.getElementById('langText'),
            modalCity: document.getElementById('modalCity'),
            thDay: document.getElementById('thDay'),
            thDate: document.getElementById('thDate'),
            thImsak: document.getElementById('thImsak'),
            thFajr: document.getElementById('thFajr'),
            thMaghrib: document.getElementById('thMaghrib'),
            closeModalBtn: document.getElementById('closeModalBtn')
        };

        function applyLanguage(lang) {
            const t = translations[lang];
            langElements.siteTitle.textContent = t.siteTitle;
            langElements.selectCityOption.textContent = t.selectCity;
            langElements.detectLocationText.textContent = t.detectLocation;
            langElements.imsakLabel.textContent = t.imsak;
            langElements.fajrLabel.textContent = t.fajr;
            langElements.sunriseLabel.textContent = t.sunrise;
            langElements.dhuhrLabel.textContent = t.dhuhr;
            langElements.asrLabel.textContent = t.asr;
            langElements.maghribLabel.textContent = t.maghrib;
            langElements.ishaLabe.textContent = t.isha;
            langElements.countdownText.textContent = t.countdownDefault;
            langElements.monthlyBtnText.textContent = t.monthlyBtn;
            langElements.searchInput.placeholder = t.searchPlaceholder;
            langElements.favToggleText.textContent = t.favToggle;
            langElements.noResults.textContent = t.noResults;
            langElements.footerText.textContent = t.footer;
            langElements.langText.textContent = t.langToggle;
            langElements.thDay.textContent = t.thDay;
            langElements.thDate.textContent = t.thDate;
            langElements.thImsak.textContent = t.thImsak;
            langElements.thFajr.textContent = t.thFajr;
            langElements.thMaghrib.textContent = t.thMaghrib;
            langElements.closeModalBtn.textContent = t.closeModal;

            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            applyLanguage(currentLang);
        });

        // ==================== المفضلة والبحث ====================
        let favorites = JSON.parse(localStorage.getItem('ramadanFavorites')) || [];
        let showFavoritesOnly = false;

        const grid = document.getElementById('adhkarGrid');
        const searchInput = document.getElementById('searchInput');
        const favoriteToggle = document.getElementById('favoriteToggle');
        const noResultsDiv = document.getElementById('noResults');
        const toast = document.getElementById('toast');

        function saveFavorites() {
            localStorage.setItem('ramadanFavorites', JSON.stringify(favorites));
        }

        window.toggleFavorite = function(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            saveFavorites();
            if (showFavoritesOnly) {
                filterAndRender();
            } else {
                const btn = document.querySelector(`.favorite-btn[data-id="${id}"]`);
                if (btn) {
                    if (favorites.includes(id)) {
                        btn.classList.add('favorite-active');
                        btn.innerHTML = '<i class="fas fa-heart"></i>';
                    } else {
                        btn.classList.remove('favorite-active');
                        btn.innerHTML = '<i class="far fa-heart"></i>';
                    }
                }
            }
        };

        function filterAndRender() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            let filtered = adhkar;
            if (showFavoritesOnly) {
                filtered = filtered.filter(item => favorites.includes(item.id));
            }
            if (searchTerm !== '') {
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(searchTerm) ||
                    item.arabic.includes(searchTerm) ||
                    item.desc.toLowerCase().includes(searchTerm)
                );
            }
            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResultsDiv.style.display = 'block';
                return;
            }
            noResultsDiv.style.display = 'none';
            let html = '';
            filtered.forEach(item => {
                const isFav = favorites.includes(item.id);
                const favIcon = isFav ? 'fas fa-heart' : 'far fa-heart';
                html += `
                    <div class="card">
                        <button class="favorite-btn ${isFav ? 'favorite-active' : ''}" data-id="${item.id}" onclick="toggleFavorite(${item.id})">
                            <i class="${favIcon}"></i>
                        </button>
                        <div class="card-title">${item.title}</div>
                        <div class="arabic-text" id="text-${item.id}">${item.arabic}</div>
                        <div class="description">${item.desc}</div>
                        <button class="copy-btn" onclick="copyText(${item.id})">
                            <i class="fas fa-copy"></i> نسخ الذكر
                        </button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        window.copyText = function(id) {
            const textElement = document.getElementById(`text-${id}`);
            if (!textElement) return;
            const text = textElement.innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast(translations[currentLang].copyToast));
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(translations[currentLang].copyToast);
            }
        };

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ==================== المواقيت ====================
        const citySelect = document.getElementById('citySelect');
        const detectBtn = document.getElementById('detectLocation');
        const imsakEl = document.getElementById('imsak');
        const fajrEl = document.getElementById('fajr');
        const sunriseEl = document.getElementById('sunrise');
        const dhuhrEl = document.getElementById('dhuhr');
        const asrEl = document.getElementById('asr');
        const maghribEl = document.getElementById('maghrib');
        const ishaEl = document.getElementById('isha');
        const countdownText = document.getElementById('countdownText');
        const monthlyModal = document.getElementById('monthlyModal');
        const monthlyBody = document.getElementById('monthlyBody');
        const modalCity = document.getElementById('modalCity');

        let currentCity = localStorage.getItem('selectedCity') || '';

        if (currentCity) {
            citySelect.value = currentCity;
            fetchPrayerTimes(currentCity);
        }

        citySelect.addEventListener('change', function(e) {
            const city = e.target.value;
            if (city) {
                currentCity = city;
                localStorage.setItem('selectedCity', city);
                fetchPrayerTimes(city);
            }
        });

        detectBtn.addEventListener('click', function() {
            if (navigator.geolocation) {
                showToast(translations[currentLang].locationToast);
                navigator.geolocation.getCurrentPosition(async function(position) {
                    try {
                        const { latitude, longitude } = position.coords;
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${latitude}&lon=${longitude}&accept-language=ar`);
                        const data = await response.json();
                        const city = data.address.city || data.address.town || data.address.village || 'Cairo';
                        const options = Array.from(citySelect.options).map(opt => opt.value);
                        if (options.includes(city)) {
                            citySelect.value = city;
                            currentCity = city;
                        } else {
                            const newOption = new Option(city, city);
                            citySelect.add(newOption);
                            citySelect.value = city;
                            currentCity = city;
                        }
                        localStorage.setItem('selectedCity', city);
                        fetchPrayerTimes(city, latitude, longitude);
                    } catch (error) {
                        showToast(translations[currentLang].locationError);
                    }
                }, function() {
                    showToast(translations[currentLang].locationDenied);
                });
            } else {
                showToast(translations[currentLang].locationUnsupported);
            }
        });

        async function fetchPrayerTimes(city, lat = null, lng = null) {
            try {
                showToast(translations[currentLang].loadingTimes);
                let url;
                if (lat && lng) {
                    url = `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lng}&method=5&adjustment=1`;
                } else {
                    url = `https://api.aladhan.com/v1/timingsByCity?city=${city}&country=&method=5`;
                }
                
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.code === 200) {
                    const timings = data.data.timings;
                    
                    imsakEl.textContent = timings.Imsak || adjustTime(timings.Fajr, -10);
                    fajrEl.textContent = timings.Fajr;
                    sunriseEl.textContent = timings.Sunrise;
                    dhuhrEl.textContent = timings.Dhuhr;
                    asrEl.textContent = timings.Asr;
                    maghribEl.textContent = timings.Maghrib;
                    ishaEl.textContent = timings.Isha;
                    
                    updateCountdown(timings);
                    
                    generateMonthlyTable(city, data.data.date.hijri, timings);
                    
                    showToast(translations[currentLang].timesUpdated);
                }
            } catch (error) {
                showToast(translations[currentLang].timesFailed);
                console.error(error);
            }
        }

        function adjustTime(timeStr, minutes) {
            const [h, m] = timeStr.split(':').map(Number);
            const date = new Date();
            date.setHours(h, m + minutes, 0);
            return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}`;
        }

        function updateCountdown(timings) {
            const now = new Date();
            const currentTime = now.getHours() * 60 + now.getMinutes();
            const fajr = timeToMinutes(timings.Fajr);
            const maghrib = timeToMinutes(timings.Maghrib);
            
            let nextEvent = '';
            let nextTime = '';
            
            if (currentTime < fajr) {
                nextEvent = currentLang === 'ar' ? 'الإمساك' : 'Imsak';
                nextTime = fajr;
            } else if (currentTime < maghrib) {
                nextEvent = currentLang === 'ar' ? 'الإفطار' : 'Iftar';
                nextTime = maghrib;
            } else {
                nextEvent = currentLang === 'ar' ? 'الإمساك (غداً)' : 'Imsak (tomorrow)';
                nextTime = fajr + 1440;
            }
            
            const diff = nextTime - currentTime;
            const hours = Math.floor(diff / 60);
            const minutes = diff % 60;
            
            const msg = currentLang === 'ar' 
                ? `⏳ متبقي على ${nextEvent}: ${hours} ساعة و ${minutes} دقيقة`
                : `⏳ Time until ${nextEvent}: ${hours} h ${minutes} m`;
            countdownText.textContent = msg;
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function generateMonthlyTable(city, hijri, todayTimings) {
            modalCity.textContent = translations[currentLang].modalTitle + city;
            let html = '';
            const monthDays = 30;
            const baseFajr = timeToMinutes(todayTimings.Fajr);
            const baseMaghrib = timeToMinutes(todayTimings.Maghrib);
            
            for (let i = 1; i <= monthDays; i++) {
                const dayOffset = (i - 15) * 0.5;
                const fajrMin = Math.round(baseFajr + dayOffset);
                const maghribMin = Math.round(baseMaghrib - dayOffset);
                
                const fajrHour = Math.floor(fajrMin / 60);
                const fajrMinute = fajrMin % 60;
                const maghribHour = Math.floor(maghribMin / 60);
                const maghribMinute = maghribMin % 60;
                
                const fajrStr = `${fajrHour.toString().padStart(2,'0')}:${fajrMinute.toString().padStart(2,'0')}`;
                const maghribStr = `${maghribHour.toString().padStart(2,'0')}:${maghribMinute.toString().padStart(2,'0')}`;
                const imsakStr = adjustTime(fajrStr, -10);
                
                const gregDate = `${i} فبراير 2026`;
                
                html += `<tr>
                    <td>${i}</td>
                    <td>${gregDate}</td>
                    <td>${imsakStr}</td>
                    <td>${fajrStr}</td>
                    <td>${maghribStr}</td>
                </tr>`;
            }
            monthlyBody.innerHTML = html;
        }

        document.getElementById('showMonthly').addEventListener('click', function() {
            if (currentCity) {
                monthlyModal.classList.add('show');
            } else {
                showToast(currentLang === 'ar' ? 'الرجاء اختيار مدينة أولاً' : 'Please select a city first');
            }
        });

        filterAndRender();
        searchInput.addEventListener('input', filterAndRender);
        favoriteToggle.addEventListener('click', function() {
            showFavoritesOnly = !showFavoritesOnly;
            favoriteToggle.classList.toggle('active');
            filterAndRender();
        });

        applyLanguage('ar');
    </script>
