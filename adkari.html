<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أذكار - Adhkar</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* متغيرات الألوان للوضع الليلي (الافتراضي) */
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            padding: 30px 20px 50px;
            transition: background-color 0.3s, color 0.3s;
        }

        /* الوضع النهاري */
        body.light-mode {
            background-color: #ffffff;
            color: #000000;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* شريط الأزرار العلوي (اللغة + الوضع) */
        .top-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
        }

        .lang-btn, .mode-btn {
            background: #333333;
            color: #ffffff;
            border: none;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #777777;
            transition: 0.2s;
        }

        body.light-mode .lang-btn,
        body.light-mode .mode-btn {
            background: #e0e0e0;
            color: #000000;
            border-color: #888888;
        }

        .lang-btn:hover, .mode-btn:hover {
            background: #555555;
        }

        body.light-mode .lang-btn:hover,
        body.light-mode .mode-btn:hover {
            background: #c0c0c0;
        }

        /* الشعار - بدون أي حواف، ويتم تغيير الصورة عبر JS */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo {
            max-width: 180px;
            height: auto;
            display: inline-block;
        }

        /* شريط البحث */
        .search-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }
        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #666666;
            font-size: 1.4rem;
        }
        .search-box input {
            width: 100%;
            padding: 18px 55px 18px 25px;
            border-radius: 60px;
            border: 2px solid transparent;
            font-size: 1.3rem;
            background: #222222;
            font-family: 'Tajawal', sans-serif;
            color: #ffffff;
            transition: 0.2s;
        }
        body.light-mode .search-box input {
            background: #f0f0f0;
            color: #000000;
            border-color: #cccccc;
        }
        .search-box input:focus {
            outline: none;
            border-color: #888888;
            background: #333333;
        }
        body.light-mode .search-box input:focus {
            background: #ffffff;
            border-color: #666666;
        }

        .favorite-toggle {
            background: #333333;
            border: 1px solid #777777;
            border-radius: 60px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
            transition: 0.2s;
        }
        body.light-mode .favorite-toggle {
            background: #e0e0e0;
            color: #000000;
            border-color: #888888;
        }
        .favorite-toggle i {
            color: inherit;
        }
        .favorite-toggle.active {
            background: #555555;
            color: #ffffff;
            border-color: #aaaaaa;
        }
        body.light-mode .favorite-toggle.active {
            background: #c0c0c0;
            color: #000000;
        }

        /* أزرار الفئات */
        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }
        .cat-btn {
            background: #222222;
            border: 1px solid #666666;
            border-radius: 60px;
            padding: 15px 30px;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 0 #111111;
        }
        body.light-mode .cat-btn {
            background: #e0e0e0;
            color: #000000;
            border-color: #888888;
            box-shadow: 0 5px 0 #aaaaaa;
        }
        .cat-btn i {
            font-size: 1.8rem;
            color: inherit;
        }
        .cat-btn.active {
            background: #444444;
            color: #ffffff;
            border-color: #aaaaaa;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #222222;
        }
        body.light-mode .cat-btn.active {
            background: #c0c0c0;
            color: #000000;
            border-color: #666666;
            box-shadow: 0 8px 0 #888888;
        }
        .cat-btn:hover {
            background: #444444;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #222222;
        }
        body.light-mode .cat-btn:hover {
            background: #c0c0c0;
            color: #000000;
            box-shadow: 0 8px 0 #888888;
        }

        /* شبكة البطاقات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }
        .card {
            background: #222222;
            border-radius: 40px;
            padding: 25px 20px 20px;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.8), 0 0 0 1px #555555 inset;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid #444444;
        }
        body.light-mode .card {
            background: #f8f8f8;
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.2), 0 0 0 1px #cccccc inset;
            border-color: #bbbbbb;
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 25px 40px -5px #000000, 0 0 0 2px #777777 inset;
        }
        body.light-mode .card:hover {
            box-shadow: 0 25px 40px -5px rgba(0,0,0,0.3), 0 0 0 2px #aaaaaa inset;
        }

        .favorite-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #333333;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            cursor: pointer;
            z-index: 10;
            color: #888888;
            border: 1px solid #555555;
        }
        body.light-mode .favorite-btn {
            background: #e0e0e0;
            color: #aaaaaa;
            border-color: #cccccc;
        }
        .favorite-btn.favorite-active {
            color: #ffffff;
            background: #555555;
            border-color: #888888;
        }
        body.light-mode .favorite-btn.favorite-active {
            color: #000000;
            background: #c0c0c0;
            border-color: #888888;
        }

        .card-title {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            background: #333333;
            display: inline-block;
            padding: 8px 25px 8px 60px;
            border-radius: 40px;
            margin-bottom: 20px;
            border: 1px solid #555555;
        }
        body.light-mode .card-title {
            color: #000000;
            background: #e0e0e0;
            border-color: #bbbbbb;
        }

        .arabic-text {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            line-height: 1.7;
            font-weight: 700;
            color: #ffffff;
            background: #1a1a1a;
            padding: 25px 15px;
            border-radius: 35px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid #444444;
        }
        body.light-mode .arabic-text {
            color: #000000;
            background: #f0f0f0;
            border-color: #cccccc;
        }

        .description {
            font-size: 1.3rem;
            color: #ffffff;
            background: #2a2a2a;
            padding: 12px 20px;
            border-radius: 50px;
            margin: 10px 0 20px;
            text-align: center;
            border: 1px solid #555555;
        }
        body.light-mode .description {
            color: #000000;
            background: #e8e8e8;
            border-color: #bbbbbb;
        }

        .copy-btn {
            background: #333333;
            border: none;
            color: #ffffff;
            font-size: 1.4rem;
            padding: 15px 20px;
            border-radius: 60px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            border: 1px solid #555555;
            margin-top: auto;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            box-shadow: 0 8px 0 #111111;
            width: 100%;
        }
        body.light-mode .copy-btn {
            background: #e0e0e0;
            color: #000000;
            border-color: #bbbbbb;
            box-shadow: 0 8px 0 #aaaaaa;
        }
        .copy-btn:hover {
            background: #555555;
            color: #ffffff;
            transform: translateY(-3px);
            box-shadow: 0 10px 0 #222222;
        }
        body.light-mode .copy-btn:hover {
            background: #c0c0c0;
            color: #000000;
            box-shadow: 0 10px 0 #888888;
        }
        .copy-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #222222;
        }

        /* رسالة منبثقة */
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #222222;
            color: #ffffff;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.6rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            border: 2px solid #777777;
            z-index: 1000;
            display: none;
        }
        body.light-mode .toast {
            background: #e0e0e0;
            color: #000000;
            border-color: #888888;
        }
        .toast.show {
            display: block;
            animation: fadeInOut 2s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }

        /* رسالة عدم وجود نتائج */
        .no-results {
            text-align: center;
            font-size: 2rem;
            color: #cccccc;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 60px;
            margin-top: 50px;
            border: 2px dashed #777777;
            display: none;
        }
        body.light-mode .no-results {
            color: #333333;
            background: #f0f0f0;
            border-color: #aaaaaa;
        }

        footer {
            margin-top: 70px;
            text-align: center;
            font-size: 1.4rem;
            color: #ffffff;
            background: #1a1a1a;
            padding: 20px 40px;
            border-radius: 80px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            border: 1px solid #555555;
        }
        body.light-mode footer {
            color: #000000;
            background: #e0e0e0;
            border-color: #aaaaaa;
        }
        footer i {
            color: inherit;
            margin: 0 10px;
        }

        @media (max-width: 600px) {
            .cat-btn { font-size: 1.2rem; padding: 12px 20px; }
            .favorite-toggle { padding: 12px 20px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- شريط الأزرار العلوي (اللغة + تبديل الوضع) -->
        <div class="top-bar">
            <button class="mode-btn" id="modeToggle">
                <i class="fas fa-moon"></i>
                <span id="modeText">ليلي</span>
            </button>
            <button class="lang-btn" id="langToggle">
                <i class="fas fa-language"></i>
                <span id="langText">English</span>
            </button>
        </div>

        <!-- الشعار - سيتم تغيير الصورة حسب الوضع -->
        <div class="logo-container">
            <img src="logo-dark.png" alt="شعار أذكار" class="logo" id="logoImg">
        </div>

        <!-- شريط البحث والمفضلة -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="ابحث عن ذكر...">
            </div>
            <button class="favorite-toggle" id="favoriteToggle">
                <i class="fas fa-heart"></i>
                <span id="favToggleText">المفضلة</span>
            </button>
        </div>

        <!-- أزرار الفئات -->
        <div class="category-buttons">
            <button class="cat-btn active" id="btnRamadan">
                <i class="fas fa-moon"></i>
                <span id="ramadanBtnText">أدعية رمضان</span>
            </button>
            <button class="cat-btn" id="btnEidFitr">
                <i class="fas fa-star-and-crescent"></i>
                <span id="fitrBtnText">أدعية عيد الفطر</span>
            </button>
            <button class="cat-btn" id="btnEidAdha">
                <i class="fas fa-dove"></i>
                <span id="adhaBtnText">أدعية عيد الأضحى</span>
            </button>
        </div>

        <!-- شبكة الأذكار -->
        <div class="grid" id="adhkarGrid"></div>
        <div id="noResults" class="no-results">لا توجد نتائج مطابقة</div>

        <footer>
            <i class="fas fa-heart"></i> 
            <span id="footerText">تقبل الله منا ومنكم</span>
            <i class="fas fa-heart"></i>
        </footer>
    </div>

    <div class="toast" id="toast">✅ تم النسخ</div>

    <script>
        // ==================== قوائم الأدعية ====================
        const ramadanDuas = [
            { id: 1, title: "🌟 دعاء رؤية الهلال", arabic: "اللَّهُمَّ أَهْلِلْهُ عَلَيْنَا بِالأَمْنِ وَالإِيمَانِ، وَالسَّلاَمَةِ وَالإِسْلاَمِ، رَبِّي وَرَبُّكَ اللَّهُ", desc: "يُقال عند رؤية هلال رمضان" },
            { id: 2, title: "🌙 نية الصوم", arabic: "نَوَيْتُ صَوْمَ غَدٍ مِنْ شَهْرِ رَمَضَانَ", desc: "تُقال في القلب عند السحور" },
            { id: 3, title: "🍽️ دعاء قبل الإفطار", arabic: "اللَّهُمَّ لَكَ صُمْتُ وَعَلَى رِزْقِكَ أَفْطَرْتُ", desc: "يُقال قبل تناول الإفطار" },
            { id: 4, title: "💧 دعاء بعد الإفطار", arabic: "ذَهَبَ الظَّمَأُ وَابْتَلَّتِ الْعُرُوقُ، وَثَبَتَ الأَجْرُ إِنْ شَاءَ اللَّهُ", desc: "يُقال بعد الإفطار" },
            { id: 5, title: "🌃 دعاء ليلة القدر", arabic: "اللَّهُمَّ إِنَّكَ عَفُوٌّ تُحِبُّ الْعَفْوَ فَاعْفُ عَنِّي", desc: "أفضل دعاء في العشر الأواخر" },
            { id: 6, title: "🕯️ دعاء العشر الأواخر", arabic: "اللَّهُمَّ أَجِرْنِي مِنَ النَّارِ", desc: "يُردد بكثرة في العشر الأواخر" },
            { id: 7, title: "👨‍👩‍👧 دعاء الإفطار عند الآخرين", arabic: "أَفْطَرَ عِنْدَكُمُ الصَّائِمُونَ، وَأَكَلَ طَعَامَكُمُ الأَبْرَارُ، وَتَنَزَّلَتْ عَلَيْكُمُ الْمَلاَئِكَةُ", desc: "يُقال لمن أفطرت عندهم" },
            { id: 8, title: "🥗 دعاء السحور", arabic: "اللَّهُمَّ بَارِكْ لَنَا فِي سُحُورِنَا وَاغْفِرْ لَنَا ذُنُوبَنَا", desc: "طلب البركة والمغفرة في السحور" },
            { id: 9, title: "🤲 دعاء الصائم إذا حضر الطعام", arabic: "إِذَا دُعِيَ أَحَدُكُمْ إِلَى طَعَامٍ فَلْيُجِبْ، فَإِنْ كَانَ صَائِمًا فَلْيُصَلِّ", desc: "الدعاء عند دعوة الصائم" },
            { id: 10, title: "📿 دعاء يوم الجمعة في رمضان", arabic: "اللَّهُمَّ اغْفِرْ لِلْمُسْلِمِينَ وَالْمُسْلِمَاتِ، وَالْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ، الأَحْيَاءِ مِنْهُمْ وَالأَمْوَاتِ", desc: "يُستحب الإكثار منه يوم الجمعة" }
        ];

        const eidFitrDuas = [
            { id: 101, title: "🎉 تكبيرات العيد", arabic: "الله أكبر الله أكبر لا إله إلا الله، والله أكبر الله أكبر ولله الحمد", desc: "تكبيرات عيد الفطر" },
            { id: 102, title: "🤲 دعاء العيد", arabic: "تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ", desc: "التهنئة بالعيد" },
            { id: 103, title: "🍬 دعاء بعد صلاة العيد", arabic: "اللَّهُمَّ اجْعَلْ هَذَا الْعِيدَ فَرَحًا وَسُرُورًا عَلَى الْمُسْلِمِينَ", desc: "دعاء بمناسبة العيد" },
            { id: 104, title: "💝 دعاء العيد للأهل", arabic: "اللَّهُمَّ بَارِكْ لَنَا فِي أَهْلِنَا وَأَوْلَادِنَا وَاجْعَلْنَا لَهُمْ رَاعِينَ", desc: "دعاء للأهل في العيد" },
            { id: 105, title: "🌅 دعاء العيد للوالدين", arabic: "اللَّهُمَّ اغْفِرْ لِوَالِدَيْنَا وَارْحَمْهُمَا كَمَا رَبَّيَانَا صِغَارًا", desc: "دعاء للوالدين في العيد" },
            { id: 106, title: "🤝 دعاء العيد للإخوة", arabic: "اللَّهُمَّ أَلِّفْ بَيْنَ قُلُوبِنَا وَأَصْلِحْ ذَاتَ بَيْنِنَا", desc: "دعاء للأخوة والأحباب" }
        ];

        const eidAdhaDuas = [
            { id: 201, title: "🐑 تكبيرات العيد", arabic: "الله أكبر الله أكبر لا إله إلا الله، والله أكبر الله أكبر ولله الحمد", desc: "تكبيرات عيد الأضحى" },
            { id: 202, title: "🕋 دعاء يوم عرفة", arabic: "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير", desc: "أفضل الدعاء يوم عرفة" },
            { id: 203, title: "🐪 دعاء الأضحية", arabic: "بِسْمِ اللَّهِ وَاللَّهُ أَكْبَرُ، اللَّهُمَّ هَذَا مِنْكَ وَلَكَ، اللَّهُمَّ تَقَبَّلْ مِنِّي", desc: "يقال عند ذبح الأضحية" },
            { id: 204, title: "🙏 دعاء بعد الأضحية", arabic: "اللَّهُمَّ تَقَبَّلْ هَذِهِ الأُضْحِيَّةَ وَاجْعَلْهَا خَالِصَةً لِوَجْهِكَ الْكَرِيمِ", desc: "دعاء قبول الأضحية" },
            { id: 205, title: "🤲 دعاء العيد", arabic: "تَقَبَّلَ اللَّهُ مِنَّا وَمِنْكُمْ وَأَحْيَاكُمْ لَهُ وَأَعَادَهُ عَلَيْكُمْ", desc: "التهنئة بعيد الأضحى" },
            { id: 206, title: "🕊️ دعاء العيد للفقراء", arabic: "اللَّهُمَّ أَغْنِ فُقَرَاءَ الْمُسْلِمِينَ وَفَرِّجْ هَمَّ الْمَهْمُومِينَ", desc: "دعاء للفقراء والمحتاجين" }
        ];

        // ==================== المتغيرات العامة ====================
        let currentDuas = ramadanDuas;
        let favorites = JSON.parse(localStorage.getItem('ramadanFavorites')) || [];
        let showFavoritesOnly = false;
        let currentLang = localStorage.getItem('adhkarLang') || 'ar';
        let currentMode = localStorage.getItem('adhkarMode') || 'dark'; // dark أو light

        const grid = document.getElementById('adhkarGrid');
        const searchInput = document.getElementById('searchInput');
        const favoriteToggle = document.getElementById('favoriteToggle');
        const noResultsDiv = document.getElementById('noResults');
        const toast = document.getElementById('toast');
        const btnRamadan = document.getElementById('btnRamadan');
        const btnEidFitr = document.getElementById('btnEidFitr');
        const btnEidAdha = document.getElementById('btnEidAdha');
        const langToggle = document.getElementById('langToggle');
        const modeToggle = document.getElementById('modeToggle');
        const modeIcon = modeToggle.querySelector('i');
        const modeText = document.getElementById('modeText');
        const logoImg = document.getElementById('logoImg');

        // عناصر الترجمة
        const langElements = {
            searchInput: document.getElementById('searchInput'),
            favToggleText: document.getElementById('favToggleText'),
            ramadanBtnText: document.getElementById('ramadanBtnText'),
            fitrBtnText: document.getElementById('fitrBtnText'),
            adhaBtnText: document.getElementById('adhaBtnText'),
            noResults: document.getElementById('noResults'),
            footerText: document.getElementById('footerText'),
            langText: document.getElementById('langText')
        };

        // ==================== الترجمة ====================
        const translations = {
            ar: {
                searchPlaceholder: "ابحث عن ذكر...",
                favToggle: "المفضلة",
                ramadanBtn: "أدعية رمضان",
                fitrBtn: "أدعية عيد الفطر",
                adhaBtn: "أدعية عيد الأضحى",
                noResults: "لا توجد نتائج مطابقة",
                footer: "تقبل الله منا ومنكم",
                copyToast: "✅ تم النسخ",
                langToggle: "English",
                modeLight: "نهاري",
                modeDark: "ليلي"
            },
            en: {
                searchPlaceholder: "Search for dhikr...",
                favToggle: "Favorites",
                ramadanBtn: "Ramadan Duas",
                fitrBtn: "Eid al-Fitr Duas",
                adhaBtn: "Eid al-Adha Duas",
                noResults: "No matching results",
                footer: "May Allah accept from us and you",
                copyToast: "✅ Copied",
                langToggle: "العربية",
                modeLight: "Light",
                modeDark: "Dark"
            }
        };

        function applyLanguage(lang) {
            const t = translations[lang];
            langElements.searchInput.placeholder = t.searchPlaceholder;
            langElements.favToggleText.textContent = t.favToggle;
            langElements.ramadanBtnText.textContent = t.ramadanBtn;
            langElements.fitrBtnText.textContent = t.fitrBtn;
            langElements.adhaBtnText.textContent = t.adhaBtn;
            langElements.noResults.textContent = t.noResults;
            langElements.footerText.textContent = t.footer;
            langElements.langText.textContent = t.langToggle;

            // تحديث نص زر الوضع حسب اللغة الحالية
            modeText.textContent = currentMode === 'dark' ? t.modeDark : t.modeLight;

            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.documentElement.lang = lang;
            localStorage.setItem('adhkarLang', lang);
        }

        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            applyLanguage(currentLang);
        });

        // ==================== تبديل الوضع والشعار ====================
        function applyMode(mode) {
            if (mode === 'light') {
                document.body.classList.add('light-mode');
                modeIcon.className = 'fas fa-sun';
                modeText.textContent = translations[currentLang].modeLight;
                // تغيير الشعار لصورة الوضع النهاري
                logoImg.src = 'black.png';
            } else {
                document.body.classList.remove('light-mode');
                modeIcon.className = 'fas fa-moon';
                modeText.textContent = translations[currentLang].modeDark;
                // تغيير الشعار لصورة الوضع الليلي
                logoImg.src = 'white.png';
            }
            localStorage.setItem('adhkarMode', mode);
        }

        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'dark' ? 'light' : 'dark';
            applyMode(currentMode);
        });

        // ==================== المفضلة والبحث ====================
        function saveFavorites() {
            localStorage.setItem('ramadanFavorites', JSON.stringify(favorites));
        }

        window.toggleFavorite = function(id) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
            } else {
                favorites.push(id);
            }
            saveFavorites();
            if (showFavoritesOnly) {
                filterAndRender();
            } else {
                const btn = document.querySelector(`.favorite-btn[data-id="${id}"]`);
                if (btn) {
                    if (favorites.includes(id)) {
                        btn.classList.add('favorite-active');
                        btn.innerHTML = '<i class="fas fa-heart"></i>';
                    } else {
                        btn.classList.remove('favorite-active');
                        btn.innerHTML = '<i class="far fa-heart"></i>';
                    }
                }
            }
        };

        function filterAndRender() {
            const searchTerm = searchInput.value.trim().toLowerCase();
            let filtered = currentDuas;
            if (showFavoritesOnly) {
                filtered = filtered.filter(item => favorites.includes(item.id));
            }
            if (searchTerm !== '') {
                filtered = filtered.filter(item =>
                    item.title.toLowerCase().includes(searchTerm) ||
                    item.arabic.includes(searchTerm) ||
                    item.desc.toLowerCase().includes(searchTerm)
                );
            }
            if (filtered.length === 0) {
                grid.innerHTML = '';
                noResultsDiv.style.display = 'block';
                return;
            }
            noResultsDiv.style.display = 'none';
            let html = '';
            filtered.forEach(item => {
                const isFav = favorites.includes(item.id);
                const favIcon = isFav ? 'fas fa-heart' : 'far fa-heart';
                html += `
                    <div class="card">
                        <button class="favorite-btn ${isFav ? 'favorite-active' : ''}" data-id="${item.id}" onclick="toggleFavorite(${item.id})">
                            <i class="${favIcon}"></i>
                        </button>
                        <div class="card-title">${item.title}</div>
                        <div class="arabic-text" id="text-${item.id}">${item.arabic}</div>
                        <div class="description">${item.desc}</div>
                        <button class="copy-btn" onclick="copyText(${item.id})">
                            <i class="fas fa-copy"></i> نسخ الذكر
                        </button>
                    </div>
                `;
            });
            grid.innerHTML = html;
        }

        window.copyText = function(id) {
            const textElement = document.getElementById(`text-${id}`);
            if (!textElement) return;
            const text = textElement.innerText;
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => showToast(translations[currentLang].copyToast));
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                showToast(translations[currentLang].copyToast);
            }
        };

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        // ==================== تبديل الفئات ====================
        function setActiveCategory(activeBtn) {
            [btnRamadan, btnEidFitr, btnEidAdha].forEach(btn => btn.classList.remove('active'));
            activeBtn.classList.add('active');
        }

        btnRamadan.addEventListener('click', () => {
            setActiveCategory(btnRamadan);
            currentDuas = ramadanDuas;
            showFavoritesOnly = false;
            favoriteToggle.classList.remove('active');
            filterAndRender();
        });

        btnEidFitr.addEventListener('click', () => {
            setActiveCategory(btnEidFitr);
            currentDuas = eidFitrDuas;
            showFavoritesOnly = false;
            favoriteToggle.classList.remove('active');
            filterAndRender();
        });

        btnEidAdha.addEventListener('click', () => {
            setActiveCategory(btnEidAdha);
            currentDuas = eidAdhaDuas;
            showFavoritesOnly = false;
            favoriteToggle.classList.remove('active');
            filterAndRender();
        });

        searchInput.addEventListener('input', filterAndRender);
        favoriteToggle.addEventListener('click', () => {
            showFavoritesOnly = !showFavoritesOnly;
            favoriteToggle.classList.toggle('active');
            filterAndRender();
        });

        // التهيئة
        filterAndRender();
        applyLanguage(currentLang);
        applyMode(currentMode);
    </script>
</body>
</html>
